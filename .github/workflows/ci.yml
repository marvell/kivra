name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run linters
        run: Scripts/lint.sh
      - name: Run tests
        run: swift test

  package-and-verify:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Build app bundle
        run: OUTPUT_DIRECTORY="$RUNNER_TEMP/output" Scripts/package-app.sh
      - name: Verify app bundle
        run: Scripts/verify-app.sh "$RUNNER_TEMP/output/Kivra.app"
      - name: Build development app bundle
        run: BUILD_VARIANT=dev OUTPUT_DIRECTORY="$RUNNER_TEMP/output" Scripts/package-app.sh
      - name: Verify development app bundle
        run: Scripts/verify-app.sh "$RUNNER_TEMP/output/Kivra Dev.app"
      - name: Package disk image
        run: VERSION=0.0.0 Scripts/package-dmg.sh "$RUNNER_TEMP/output/Kivra.app" "$RUNNER_TEMP/Kivra-0.0.0-macOS-arm64.dmg"
      - name: Verify disk image
        run: Scripts/verify-dmg.sh "$RUNNER_TEMP/Kivra-0.0.0-macOS-arm64.dmg"
