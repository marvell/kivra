version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  run:
    desc: Run Kivra for development
    cmds:
      - swift run

  build:
    desc: Build the release executable
    cmds:
      - swift build -c release

  test:
    desc: Run tests
    cmds:
      - swift test

  format:
    desc: Format Swift source files
    cmds:
      - swift format --in-place --recursive --parallel Sources Tests Scripts Package.swift

  lint:
    desc: Run Swift formatting and lint checks
    cmds:
      - Scripts/lint.sh

  reset-onboarding:
    desc: Reset Kivra and Kivra Dev onboarding preferences (quit both first)
    cmds:
      - defaults delete com.zemliakov.kivra onboardingCompleted || true
      - defaults delete com.zemliakov.kivra leftInputSourceID || true
      - defaults delete com.zemliakov.kivra rightInputSourceID || true
      - defaults delete com.zemliakov.kivra.dev onboardingCompleted || true
      - defaults delete com.zemliakov.kivra.dev leftInputSourceID || true
      - defaults delete com.zemliakov.kivra.dev rightInputSourceID || true

  install-dev:
    desc: Build and install the development app
    cmds:
      - Scripts/install-dev.sh
